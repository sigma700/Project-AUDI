services:
  postgres:
    image: postgres:16-alpine
    container_name: projectAudi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: projectAudi_dev
      POSTGRES_USER: projectAudi
      POSTGRES_PASSWORD: projectAudi_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U projectAudi -d projectAudi_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: cashnow_api
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: projectAudi_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
